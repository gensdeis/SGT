# argocd-image-updater — kind 로컬 dev 프로파일
# https://github.com/argoproj/argo-helm/tree/main/charts/argocd-image-updater
#
# Public ghcr.io 패키지만 폴링하므로 registries 설정 불필요 (default anonymous).

config:
  argocd:
    grpcWeb: true
    serverAddress: argocd-server.argocd.svc.cluster.local
    insecure: true
    plaintext: false

# polling 주기 2분
extraArgs:
  - --interval
  - 2m

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

metrics:
  enabled: true
