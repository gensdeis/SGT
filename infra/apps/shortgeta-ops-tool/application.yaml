# 숏게타 운영툴 (Next.js)
# argocd-image-updater 가 ghcr.io/gensdeis/shortgeta-ops-tool 의 short_sha 태그를
# 폴링해서 자동 rollout. shortgeta-server 와 동일 패턴.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shortgeta-ops-tool-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: web=ghcr.io/gensdeis/shortgeta-ops-tool
    argocd-image-updater.argoproj.io/web.allow-tags: regexp:^[0-9a-f]{8}$
    argocd-image-updater.argoproj.io/web.update-strategy: newest-build
    argocd-image-updater.argoproj.io/web.kustomize.image-name: ghcr.io/gensdeis/shortgeta-ops-tool
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gensdeis/SGT.git
    targetRevision: dev
    path: ops-tool/deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: shortgeta-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
