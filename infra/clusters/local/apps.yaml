# ArgoCD App-of-Apps 패턴
# 이 Application 하나가 apps/ 아래의 자식 Application 매니페스트만 추적한다.
# - include 글롭으로 application.yaml 만 픽업 (helm values, install bundle, README 제외)
# - argocd/install.yaml 은 부트스트랩 단계에서 별도 적용 (App-of-Apps 가 자기 자신을 sync 하지 않도록)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shortgeta-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/gensdeis/SGT.git
    targetRevision: dev
    path: infra/apps
    directory:
      recurse: true
      include: '{*/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
