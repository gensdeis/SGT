// 숏게타 highlight recording library
// 빌드: cd client/Assets/Plugins/Android/HighlightRecording && ./gradlew assembleRelease
// 결과: build/outputs/aar/HighlightRecording-release.aar
//       → client/Assets/Plugins/Android/HighlightRecording.aar 로 복사

plugins {
    id 'com.android.library' version '8.2.0'
}

android {
    namespace 'com.shortgeta.recording'
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
}
