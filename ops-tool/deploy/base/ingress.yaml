# Iter 4c: Traefik IngressRoute (basic auth + IP whitelist)
# 사용자가 별도로 sealed-secret 으로 ops-tool-basic-auth 를 만들어야 한다.
#   htpasswd -nb admin <password> | base64 → users.txt
#   kubectl create secret generic ops-tool-basic-auth -n shortgeta-dev --from-file=users
#   kubeseal < secret.yaml > sealed-secret.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ops-tool-basic-auth
spec:
  basicAuth:
    secret: ops-tool-basic-auth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ops-tool-ipwhitelist
spec:
  ipWhiteList:
    sourceRange:
      - 127.0.0.1/32
      - 10.0.0.0/8
      - 192.168.0.0/16
      - 172.16.0.0/12
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: shortgeta-ops-tool
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ops.shortgeta.local`)
      kind: Rule
      middlewares:
        - name: ops-tool-ipwhitelist
        - name: ops-tool-basic-auth
      services:
        - name: shortgeta-ops-tool
          port: 80
