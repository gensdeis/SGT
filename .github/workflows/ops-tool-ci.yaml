name: ops-tool-ci

on:
  pull_request:
    paths:
      - 'ops-tool/**'
      - '.github/workflows/ops-tool-ci.yaml'
  push:
    branches: [main, dev]
    paths:
      - 'ops-tool/**'
      - '.github/workflows/ops-tool-ci.yaml'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shortgeta-ops-tool

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ops-tool
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t shortgeta-ops-tool:ci ops-tool/

  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF##*/}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ops-tool
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
