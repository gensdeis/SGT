name: server-ci

on:
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yaml'
  push:
    branches: [main, dev]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yaml'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shortgeta-server

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push, PR only)
        run: docker build -t shortgeta-server:ci server/

  docker-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          BRANCH=${GITHUB_REF##*/}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
