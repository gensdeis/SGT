apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortgeta-server
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          # GHCR 자동 push (server-ci.yaml docker-push job).
          # main 브랜치 push 마다 :main 태그 갱신.
          # 특정 커밋 고정이 필요하면 :<short_sha> 사용.
          image: ghcr.io/gensdeis/shortgeta-server:main
          imagePullPolicy: Always
