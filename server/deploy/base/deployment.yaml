apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortgeta-server
  labels:
    app: shortgeta-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shortgeta-server
  template:
    metadata:
      labels:
        app: shortgeta-server
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: shortgeta-server:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: shortgeta-server-config
            - secretRef:
                name: shortgeta-server-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
