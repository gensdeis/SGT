# ⚠️ DEV 전용 평문 Secret.
# QA/Real 클러스터에는 SealedSecret 으로 교체 필수 (Docs/INFRA_PLAN.md §"Sealed Secrets" 참조).
apiVersion: v1
kind: Secret
metadata:
  name: shortgeta-server-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://shortgeta:devpass@shortgeta-postgres:5432/shortgeta_dev?sslmode=disable"
  REDIS_URL: "redis://shortgeta-redis:6379/0"
  JWT_SECRET: "local-dev-jwt-secret-change-me"
  HMAC_BASE_KEY: "local-dev-hmac-base-key"
  BUILD_GUID: "local-dev-build-guid"
