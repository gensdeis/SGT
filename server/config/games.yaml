# 숏게타 — 게임별 검증/메타 설정
# 새 미니게임 추가 시 이 파일만 수정한다 (Go 코드 변경 금지)
# 필드:
#   id              : "lower_snake_v숫자" 형식
#   title           : 한국어 표시명
#   creator_id      : "shotgeta_official" 또는 UGC 크리에이터 ID
#   time_limit_sec  : 클라이언트 제한시간 (초)
#   min_play_seconds: 점수 검증 — 이보다 짧으면 거부
#   max_score       : 점수 검증 — 이보다 크면 거부
#   rate_limit_per_min: 분당 점수 제출 횟수 한도
#   tags            : [장르, 강도, 소재, 밈도] 중 1개 이상씩

games:
  - id: "frog_catch_v1"
    title: "개구리 잡아라"
    creator_id: "shotgeta_official"
    time_limit_sec: 30
    min_play_seconds: 8
    max_score: 1000
    rate_limit_per_min: 10
    tags: ["반응속도", "동물", "병맛"]
    # Iter 2C''' demo: yaml fallback bundle URL.
    # 사용자가 Addressables 빌드 결과를 server pod /app/bundles/ 에 복사하면 동작.
    bundle_url: "/v1/bundles/StandaloneWindows64/catalog.json"
    bundle_version: "1"
    bundle_hash: ""

